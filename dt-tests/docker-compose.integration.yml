  redis-source-cluster-node1:
    image: redis:7.0
    container_name: redis-source-cluster-node1-it
    profiles: ["redis-cluster"]
    hostname: redis-source-cluster-node1
    # DT_IT_HOST_IP is the host machine IPv4 address reachable by both the
    # local integration test process and containers. The integration test
    # script `dt-tests/scripts/run-integration-tests.sh` detects and exports
    # this variable automatically before invoking `docker compose`.
    environment:
      DT_IT_HOST_IP: ${DT_IT_HOST_IP:-}
    ports:
      - "26361:6379"
      - "16361:16379"
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        exec redis-server \
          --cluster-enabled yes \
          --cluster-config-file nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --cluster-announce-ip "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" \
          --cluster-announce-port 26361 \
          --cluster-announce-bus-port 16361

