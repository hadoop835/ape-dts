    healthcheck:
      test:
        - CMD-SHELL
        - 'mongo admin -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet --eval "quit(db.isMaster().ismaster ? 0 : 1)"'
