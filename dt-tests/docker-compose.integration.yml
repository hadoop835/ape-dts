    container_name: redis-source-cluster-node3-it
    profiles: ["redis-cluster"]
    hostname: redis-source-cluster-node3
    environment:
      DT_IT_HOST_IP: ${DT_IT_HOST_IP:-}
    ports:
      - "26363:6379"
      - "16363:16379"
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        exec redis-server \
          --cluster-enabled yes \
          --cluster-config-file nodes.conf \
          --cluster-node-timeout 5000 \
          --appendonly yes \
          --cluster-announce-ip "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" \
          --cluster-announce-port 26363 \
          --cluster-announce-bus-port 16363

  redis-source-cluster-init:
    image: redis:7.0
    container_name: redis-source-cluster-init-it
    profiles: ["redis-cluster"]
    depends_on:
      - redis-source-cluster-node1
      - redis-source-cluster-node2
      - redis-source-cluster-node3
    # DT_IT_HOST_IP is reused here so `redis-cli --cluster create` reaches the
    # same host-published endpoints that Redis nodes advertise. The value is
    # provided automatically by `dt-tests/scripts/run-integration-tests.sh`.
    environment:
      DT_IT_HOST_IP: ${DT_IT_HOST_IP:-}
    entrypoint:
      - sh
      - -c
      - |
        set -eu

        until redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26361 ping \
          && redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26362 ping \
          && redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26363 ping; do
          sleep 1
        done

        cluster_ok() {
          redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26361 cluster info 2>/dev/null | grep -q 'cluster_state:ok' \
            && redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26361 cluster info 2>/dev/null | grep -q 'cluster_slots_assigned:16384'
        }

        if ! cluster_ok; then
          for _ in $(seq 1 10); do
            if yes yes | redis-cli --cluster create \
              "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}":26361 \
              "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}":26362 \
              "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}":26363 \
              --cluster-replicas 0; then
              break
            fi
            sleep 2
            if cluster_ok; then
              break
            fi
          done
        fi

        for _ in $(seq 1 10); do
          if cluster_ok; then
            exit 0
          fi
          sleep 2
        done

        echo "redis cluster failed to become ready" >&2
        redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26361 cluster nodes || true
        redis-cli -h "$${DT_IT_HOST_IP:?DT_IT_HOST_IP is required}" -p 26361 cluster info || true
        exit 1

