[extractor]
db_type=redis
extract_type=cdc
repl_id=
now_db_id=0
repl_port=10008
repl_offset=0
heartbeat_interval_secs=0
url={redis_cluster_extractor_url}
is_cluster=true

[filter]
do_dbs=*
do_events=
ignore_dbs=
ignore_tbs=
do_tbs=

[sinker]
db_type=redis
sink_type=write
method=restore
; url={redis_sinker_url_7_0}
url={redis_cluster_sinker_url}
batch_size=2
is_cluster=true

[router]
db_map=
col_map=
tb_map=

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[parallelizer]
parallel_type=redis
parallel_size=2

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
