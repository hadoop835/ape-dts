[extractor]
db_type=mysql
extract_type=snapshot
url={mysql_extractor_url}
parallel_size=3
max_rps=3

[sinker]
db_type=mysql
sink_type=write
url={mysql_sinker_url}
batch_size=2
max_rps=3

[filter]
do_tbs=test_db_1.*
do_events=insert

[parallelizer]
parallel_type=snapshot
parallel_size=2

[pipeline]
buffer_size=4
checkpoint_interval_secs=1
