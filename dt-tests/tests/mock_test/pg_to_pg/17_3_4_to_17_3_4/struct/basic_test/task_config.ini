[extractor]
db_type=pg
extract_type=struct
url={pg_extractor_url_17_3_4}
batch_size=7
parallel_size=4
parallel_type=table

[sinker]
db_type=pg
sink_type=struct
url={pg_sinker_url_17_3_4}
batch_size=1
conflict_policy=interrupt

[filter]
do_dbs=mock_db_1
do_events=
do_structures=database,table,constraint,sequence,comment,index

[parallelizer]
parallel_type=serial
parallel_size=1

[pipeline]
buffer_size=100
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs

; used only for testing
[mock]
prepare_only=false
; numeric and bool

pg_types_num=["int4", "int2", "bool", "int8", "float4", "float8", "numeric", "money", "oid"]

; string

pg_types_str=["char", "name", "text", "bpchar", "varchar", "bit", "varbit", "bytea"]

; date and time

pg_types_datetime=["date", "time", "timetz", "timestamp", "timestamptz", "interval"]

; net and uuid

pg_types_net=["uuid", "inet", "cidr", "macaddr", "macaddr8"]

; json and special
pg_types_json=["json", "jsonb", "jsonpath", "xml", "tsvector", "tsquery"]
; pg_types_custom=["int4",{"custom":{"kind":"enum","name":"mock_mood","labels":["sad","ok","happy"]}},{"custom":{"kind":"domain","name":"mock_email","base":"text","check":"VALUE LIKE '%@%'","values":["$$a@test.com$$","$$b@test.com$$","$$c@test.com$$"]}},{"custom":{"kind":"composite","name":"mock_addr","fields":[{"name":"city","type":"text"},{"name":"zip","type":"int4"}],"values":[["$$Shanghai$$","200000"],["$$Beijing$$","100000"],["$$Shenzhen$$","518000"]]}}]

; geo

pg_types_geo=["point", "lseg", "path", "box", "polygon", "line", "circle"]


; ranges
pg_types_ranges=["int4range", "int8range", "numrange", "tsrange", "tstzrange", "daterange"]
pg_types_multiranges=["int4multirange", "int8multirange", "nummultirange", "tsmultirange", "tstzmultirange", "datemultirange"]

; arrays

pg_types_arrays_1=["boolarray", "byteaarray", "chararray", "namearray", "int2array", "int4array",  "int8array", "textarray"]
pg_types_arrays_2=["bpchararray", "varchararray", "float4array", "float8array", "numericarray", "moneyarray", "oidarray", "bitarray"]
pg_types_arrays_3=["varbitarray", "uuidarray", "inetarray", "cidrarray", "macaddrarray", "macaddr8array", "timestamparray", "datearray"]
pg_types_arrays_4=["timearray", "timestamptzarray", "intervalarray", "timetzarray", "jsonarray", "jsonbarray", "xmlarray", "tsvectorarray", "tsqueryarray"]
pg_types_arrays_5=["pointarray", "lsegarray", "patharray", "boxarray", "polygonarray", "linearray", "circlearray"]

pg_types_arrays_6=["jsonpatharray", "int4rangearray", "numrangearray", "tsrangearray", "tstzrangearray", "daterangearray", "int8rangearray"]
pg_types_arrays_7=["int4multirangearray", "nummultirangearray", "tsmultirangearray", "tstzmultirangearray", "datemultirangearray", "int8multirangearray"]

db=mock_db_1
insert_rows_each_table=0
seed=777

; strategy=single
; constraints=[{"primary":[0]}]
; nullable_cols=[0,1]

unordered_compare=true
unordered_compare_threads=8
