[extractor]
db_type=mysql
extract_type=cdc
url={mysql_extractor_url_8_0}
binlog_position=0
binlog_filename=
server_id=2000
heartbeat_interval_secs=1
heartbeat_tb=heartbeat_db.ape_dts_heartbeat

[sinker]
db_type=mysql
sink_type=write
url={mysql_sinker_url_8_0}
batch_size=3
disable_foreign_key_checks=true

[filter]
do_dbs=
ignore_dbs=
; mysql instances for test: lower_case_table_names=1, so Upper_Case_DB -> upper_case_db
do_tbs=mock_db_1.*
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=rdb_merge
parallel_size=8

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs

[mock]
prepare_only=false
; numeric (13.1)
mysql_types_num=["tinyint", "tinyintunsigned", "smallint", "smallintunsigned", "mediumint", "mediumintunsigned", "int", "intunsigned", "bigint", "bigintunsigned", "decimal", "float", "double", "bit"]

; date and time (13.2)
mysql_types_datetime=["date", "datetime", "timestamp", "time", "year"]

; character and text string (13.3.2, 13.3.4)
mysql_types_str_utf8_bin=[{"char":{"length":255,"charset":"utf8","collation":"utf8_bin"}}, {"varchar":{"length":255,"charset":"utf8","collation":"utf8_bin"}}, {"tinytext":{"charset":"utf8","collation":"utf8_bin"}}, {"text":{"charset":"utf8","collation":"utf8_bin"}}, {"mediumtext":{"charset":"utf8","collation":"utf8_bin"}}, {"longtext":{"charset":"utf8","collation":"utf8_bin"}}]
mysql_types_str_utf8mb4_bin=[{"char":{"length":255,"charset":"utf8mb4","collation":"utf8mb4_bin"}}, {"varchar":{"length":255,"charset":"utf8mb4","collation":"utf8mb4_bin"}}, {"tinytext":{"charset":"utf8mb4","collation":"utf8mb4_bin"}}, {"text":{"charset":"utf8mb4","collation":"utf8mb4_bin"}}, {"mediumtext":{"charset":"utf8mb4","collation":"utf8mb4_bin"}}, {"longtext":{"charset":"utf8mb4","collation":"utf8mb4_bin"}}]
mysql_types_str_utf8mb4_0900=[{"char":{"length":255,"charset":"utf8mb4","collation":"utf8mb4_0900_ai_ci"}}, {"varchar":{"length":255,"charset":"utf8mb4","collation":"utf8mb4_0900_ai_ci"}}, {"tinytext":{"charset":"utf8mb4","collation":"utf8mb4_0900_ai_ci"}}, {"text":{"charset":"utf8mb4","collation":"utf8mb4_0900_ai_ci"}}, {"mediumtext":{"charset":"utf8mb4","collation":"utf8mb4_0900_ai_ci"}}, {"longtext":{"charset":"utf8mb4","collation":"utf8mb4_0900_ai_ci"}}]

; binary and blob (13.3.3, 13.3.4)
mysql_types_bin=["binary", "varbinary", "tinyblob", "blob", "mediumblob", "longblob"]

; enum and set (13.3.5, 13.3.6)
; json (13.5)
mysql_types_enum=["enum", "set", "json"]

; spatial (13.4)
mysql_types_spatial=["geometry", "point", "linestring", "polygon", "multipoint", "multilinestring", "multipolygon", "geometrycollection"]


db=mock_db_1
insert_rows_each_table=30
seed=777

strategy=single

unordered_compare=true
unordered_compare_threads=8
