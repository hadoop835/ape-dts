[extractor]
db_type=mongo
extract_type=snapshot
url={mongo_extractor_url}

[checker]
enable=true
db_type=mongo
url={mongo_sinker_without_auth_url}
username={mongo_sinker_username}
password={mongo_sinker_password}
batch_size=2
sample_rate=50

[filter]
do_dbs=
ignore_dbs=
do_tbs=test_db_1.*,test_db_2.*
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=mongo
parallel_size=2

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
