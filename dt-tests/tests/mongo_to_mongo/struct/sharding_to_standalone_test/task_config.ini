[extractor]
db_type=mongo
extract_type=struct
url={mongo_sharding_extractor_url}
username={mongo_sharding_extractor_username}
password={mongo_sharding_extractor_password}

[sinker]
db_type=mongo
sink_type=struct
url={mongo_sinker_url}
username={mongo_sinker_username}
password={mongo_sinker_password}
is_direct_connect=true

[filter]
do_dbs=
ignore_dbs=
do_tbs=mongo_struct_sharding_to_standalone_db.*
ignore_tbs=
do_events=
; the same with do_structures=collection
do_structures=collection,shardkey

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=serial
parallel_size=1

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs
