[global]
task_id=resume_db_test_1

[extractor]
db_type=mongo
extract_type=snapshot
url={mongo_extractor_url}

[sinker]
db_type=mongo
sink_type=write
url={mongo_sinker_without_auth_url}
username={mongo_sinker_username}
password={mongo_sinker_password}
batch_size=2

[filter]
do_dbs=test_db_1
ignore_dbs=
do_tbs=
ignore_tbs=
do_events=insert

[router]
db_map=
tb_map=
col_map=

[parallelizer]
parallel_type=snapshot
parallel_size=2

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[runtime]
log_level=info
log4rs_file=./log4rs.yaml
log_dir=./logs

[resumer]
resume_type=from_db
db_type=mongo
url={mongo_sinker_without_auth_url}
username={mongo_sinker_username}
password={mongo_sinker_password}
table_full_name=apecloud_resumer_test.ape_task_position
max_connections=1
