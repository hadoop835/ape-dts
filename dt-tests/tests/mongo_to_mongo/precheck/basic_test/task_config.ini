[extractor]
db_type=mongo
extract_type=cdc
url={mongo_extractor_url}

[sinker]
db_type=mongo
sink_type=write
batch_size=2
url={mongo_sinker_without_auth_url}
username={mongo_sinker_username}
password={mongo_sinker_password}

[filter]
#do_dbs=source_db
do_dbs=
ignore_dbs=
do_tbs=precheck_test_1.table1,admin.hehe,local.haha
# do_tbs=test.table
ignore_tbs=
do_events=insert,update,delete

[router]
db_map=
tb_map=
col_map=

[runtime]
log_level=info
log_dir=./logs
log4rs_file=./log4rs.yaml

[parallelizer]
parallel_type=serial
parallel_size=1

[pipeline]
checkpoint_interval_secs=1
buffer_size=1

[precheck]
do_struct_init=true
do_cdc=true