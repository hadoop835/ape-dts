[extractor]
db_type=mongo
extract_type=cdc
url={mongo_sharding_extractor_url}
username={mongo_sharding_extractor_username}
password={mongo_sharding_extractor_password}
source=change_stream

[filter]
ignore_dbs=
do_dbs=
do_tbs=sharding_cdc_db.*
ignore_tbs=
do_events=insert,update,delete
do_ddls=*

[sinker]
db_type=mongo
sink_type=write
batch_size=2
url={mongo_sharding_sinker_url}
username={mongo_sharding_sinker_username}
password={mongo_sharding_sinker_password}
mongo_require_shard_key_filter=true

[router]
tb_map=
col_map=
db_map=

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[parallelizer]
parallel_type=mongo
parallel_size=2

[runtime]
log_dir=./logs
log_level=info
log4rs_file=./log4rs.yaml
