[extractor]
db_type=mongo
extract_type=cdc
url={mongo_extractor_without_auth_url}
username={mongo_extractor_username}
password={mongo_extractor_password}
source=change_stream
is_direct_connection=true

[filter]
ignore_dbs=
do_dbs=
do_tbs=ddl_db.*,ddl_drop_db.*
ignore_tbs=ddl_db.ignored_coll
do_events=insert,update,delete
do_ddls=*

[sinker]
db_type=mongo
sink_type=write
batch_size=2
url={mongo_sinker_without_auth_url}
username={mongo_sinker_username}
password={mongo_sinker_password}
is_direct_connection=true

[router]
tb_map=
col_map=
db_map=

[pipeline]
buffer_size=4
checkpoint_interval_secs=1

[parallelizer]
parallel_type=mongo
parallel_size=2

[runtime]
log_dir=./logs
log_level=info
log4rs_file=./log4rs.yaml
